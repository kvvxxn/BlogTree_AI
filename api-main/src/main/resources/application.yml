spring:
  application:
    name: api-main
  profiles:
    include: oauth

  # 1. H2 콘솔 설정 (spring.h2.console)
  h2:
    console:
      enabled: true
      path: /h2-console

  # 2. 데이터소스 설정 (spring.datasource) - 밖으로 삐져나왔던 걸 안으로 넣었습니다.
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # 3. JPA/Hibernate 설정 (spring.jpa)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
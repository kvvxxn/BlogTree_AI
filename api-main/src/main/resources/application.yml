spring:
  application:
    name: api-main

  # 1. H2 콘솔 설정 (spring.h2.console)
  h2:
    console:
      enabled: true
      path: /h2-console

  # 2. 데이터소스 설정 (spring.datasource) - 밖으로 삐져나왔던 걸 안으로 넣었습니다.
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # 3. JPA/Hibernate 설정 (spring.jpa)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

oauth2:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    # 유출하면 안됨.
    client-secret: ${GOOGLE_CLIENT_SECRET}
    # ⭐ 주의: 프론트엔드가 구글에서 설정한 리다이렉트 URI와 똑같이 맞춰야 합니다! (일단 예시로 적어둠)
    redirect-uri: http://localhost:8080/login/oauth2/code/google
    # 구글과 직접 통신할 때 찌를 API 주소들 (고정값)
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo

# 2. JWT 설정 (어제 만든 것 100% 그대로 유지)
jwt:
  secret: ${JWT_SECRET}
  access-expiration: 3600000

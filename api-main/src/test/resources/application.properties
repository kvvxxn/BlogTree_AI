spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

spring.ai.openai.api-key=test-api-key
spring.ai.openai.base-url=https://api.openai.com
spring.ai.openai.embedding.options.model=test-model

oauth2.google.client-id=test-client-id
oauth2.google.client-secret=test-client-secret

spring.rabbitmq.summary.exchange=summary.exchange
spring.rabbitmq.summary.queue.request=summary.request.queue
spring.rabbitmq.summary.queue.response=summary.response.queue
spring.rabbitmq.summary.routing-key.request=summary.request
spring.rabbitmq.summary.routing-key.response=summary.response

spring.rabbitmq.recommend.exchange=recommend.exchange
spring.rabbitmq.recommend.queue.request=recommend.request.queue
spring.rabbitmq.recommend.queue.response=recommend.response.queue
spring.rabbitmq.recommend.routing-key.request=recommend.request
spring.rabbitmq.recommend.routing-key.response=recommend.response


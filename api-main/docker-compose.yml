services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: blogtree
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d blogtree"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"    # rabbitMQ 접속 포트
      - "15672:15672"  # rabbitMQ UI 접속 포트
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_management load_definitions \"/etc/rabbitmq/definitions.json\""
      TZ: Asia/Seoul
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq-definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/blogtree
      SPRING_RABBITMQ_HOST: rabbitmq
      TZ: Asia/Seoul
    volumes:
      - .:/app

  worker:
    build:
      context: ..
      dockerfile: fastapi_worker/Dockerfile.dev
    container_name: worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8001:8000"
    env_file:
      - ../fastapi_worker/.env
    environment:
      RABBITMQ_HOST: rabbitmq
      TZ: Asia/Seoul
    volumes:
      - ..:/workspace
    working_dir: /workspace

volumes:
  rabbitmq_data:
  postgres_data:

services:
  # MySQL
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: blogtree
      MYSQL_USER: mysql_user
      MYSQL_PASSWORD: mysql_password
      TZ: Asia/Seoul
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "mysql_user", "-pmysql_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  neo4j:
    image: neo4j:latest
    container_name: neo4j_knowledge_tree
    ports:
      - "7474:7474" # 웹 대시보드 (HTTP)
      - "7687:7687" # Bolt 프로토콜 (Spring Boot 연결용)
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
      TZ: Asia/Seoul

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"    # rabbitMQ 접속 포트
      - "15672:15672"  # rabbitMQ UI 접속 포트
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_management load_definitions \"/etc/rabbitmq/definitions.json\""
      TZ: Asia/Seoul
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq-definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: blogtree-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/blogtree?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_RABBITMQ_HOST: rabbitmq
      TZ: Asia/Seoul
    volumes:
      - .:/app

  worker:
    build:
      context: ..
      dockerfile: fastapi_worker/Dockerfile.dev
    container_name: blogtree-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8001:8000"
    env_file:
      - ../fastapi_worker/.env
    environment:
      RABBITMQ_HOST: rabbitmq
      TZ: Asia/Seoul
    volumes:
      - ..:/workspace
    working_dir: /workspace

volumes:
  rabbitmq_data:
  mysql_data:
  neo4j_data:
